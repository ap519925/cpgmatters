id: registration
title: Registration
description: null
categories: {  }
elements: |
  step_1:
    '#type': webform_wizard_page
    '#title': 'Step 1'
    reg_header_s1:
      '#type': webform_markup
      '#markup': '<div class="reg-header"><div class="reg-logo"><span class="cpg">CPG MATTERS</span></div><div class="reg-subtitle">CONSUMER PACKAGED GOODS NEWS & INSIGHTS</div></div><div class="progress-bar"><div class="progress-fill step-1"></div></div><div class="reg-content"><div class="welcome-message"><h1 class="welcome-title">Welcome! Let''s get started.</h1><p class="welcome-text">We''re excited to have you join the CPG Matters community. First, let''s set up your account with a few quick details.</p></div>'
    username:
      '#type': textfield
      '#title': 'What username would you like?'
      '#description': 'This is how you''ll log in. Choose something memorable!<br><span class="helper-text">Letters, numbers, and underscores only. 3-20 characters.</span>'
      '#required': true
      '#attributes':
        class:
          - form-input
        placeholder: 'e.g., sarah_cpg_pro'
      '#wrapper_attributes':
        class:
          - form-group
    email:
      '#type': email
      '#title': "What's your email address?"
      '#description': 'We''ll use this to send you updates and important account info.<br><span class="helper-text">We''ll never share your email with anyone.</span>'
      '#required': true
      '#attributes':
        class:
          - form-input
        placeholder: your.email@company.com
      '#wrapper_attributes':
        class:
          - form-group
    password:
      '#type': password
      '#title': 'Create a secure password'
      '#description': 'Make it strong to keep your account safe!<br><span class="helper-text">At least 8 characters with uppercase, lowercase, and numbers.</span>'
      '#required': true
      '#attributes':
        class:
          - form-input
        placeholder: ••••••••
      '#wrapper_attributes':
        class:
          - form-group
    display_name:
      '#type': textfield
      '#title': 'What name should we call you?'
      '#description': "This is how we'll greet you around the site. First name works great!<br><span class=\"helper-text\">We'll use this in emails and when you're logged in.</span>"
      '#required': true
      '#attributes':
        class:
          - form-input
        placeholder: 'e.g., Sarah'
      '#wrapper_attributes':
        class:
          - form-group
    finish_later:
      '#type': submit
      '#value': 'Create Account & Finish Later'
      '#limit_validation_errors':
        - - username
        - - email
        - - password
        - - display_name
      '#attributes':
        class:
          - back-btn
          - FinishLater
        formnovalidate: formnovalidate
        style: 'margin-bottom: 20px;'
    reg_footer_s1:
      '#type': webform_markup
      '#markup': '</div><div class="reg-footer"><p class="footer-text">Already have an account? <a href="/user/login" class="footer-link">Sign in here</a></p><p class="footer-text"><a href="/" class="footer-link footer-link--home">← Back to Homepage</a></p></div>'
  step_2:
    '#type': webform_wizard_page
    '#title': 'Step 2'
    reg_header_s2:
      '#type': webform_markup
      '#markup': '<div class="reg-header"><div class="reg-logo"><span class="cpg">CPG MATTERS</span></div><div class="reg-subtitle">CONSUMER PACKAGED GOODS NEWS & INSIGHTS</div></div><div class="progress-bar"><div class="progress-fill step-2"></div></div><div class="reg-content"><div class="welcome-message"><h1 class="welcome-title">Great! Now tell us about your background.</h1><p class="welcome-text">Help us curate the perfect content tailored for your specific role within the CPG industry.</p></div>'
    company_name:
      '#type': textfield
      '#title': 'What company do you work for?'
      '#description': 'This helps us provide relevant industry insights and networking opportunities.'
      '#required': true
      '#attributes':
        class:
          - form-input
        placeholder: 'e.g., Procter & Gamble'
      '#wrapper_attributes':
        class:
          - form-group
    position:
      '#type': select
      '#title': "What's your role or position?"
      '#description': "We'll use this to tailor content to your interests."
      '#required': true
      '#options':
        '': 'Select your role...'
        executive: 'C-Level Executive (CEO, CMO, etc.)'
        vp: 'VP / Senior Vice President'
        director: Director
        manager: Manager
        specialist: 'Specialist / Coordinator'
      '#attributes':
        class:
          - form-select
      '#wrapper_attributes':
        class:
          - form-group
    department:
      '#type': select
      '#title': 'Which area do you work in? <span class="optional-badge">Optional</span>'
      '#description': 'This helps us recommend the most relevant articles and resources.'
      '#options':
        '': 'Select your department...'
        marketing: Marketing
        sales: Sales
        product: 'Product Development'
      '#attributes':
        class:
          - form-select
      '#wrapper_attributes':
        class:
          - form-group
    reg_footer_s2:
      '#type': webform_markup
      '#markup': '</div><div class="reg-footer"><p class="footer-text">Step 2 of 2 • After this, we''ll send a confirmation email to verify your account.</p><p class="footer-text"><a href="/" class="footer-link footer-link--home">← Back to Homepage</a></p></div>'
